<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Session Hub</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #d2a8ff;
    --accent-dim: #8957e5;
    --green: #3fb950;
    --blue: #58a6ff;
    --orange: #d29922;
    --red: #f85149;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  /* Header */
  .header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .search-box {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--text);
    font-size: 14px;
    width: 280px;
    outline: none;
  }
  .search-box:focus { border-color: var(--accent-dim); }
  .search-box::placeholder { color: var(--text-muted); }
  .machine-count {
    font-size: 13px;
    color: var(--text-muted);
  }

  /* Main content */
  .content { max-width: 960px; margin: 0 auto; padding: 24px; }

  /* Machine group */
  .machine-group {
    margin-bottom: 32px;
  }
  .machine-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .machine-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }
  .machine-dot.stale { background: var(--text-muted); }
  .machine-name {
    font-size: 16px;
    font-weight: 600;
  }
  .machine-os {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg-tertiary);
    padding: 2px 8px;
    border-radius: 12px;
  }
  .machine-seen {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Project */
  .project {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .project-header {
    padding: 12px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    user-select: none;
    transition: background 0.15s;
  }
  .project-header:hover { background: var(--bg-tertiary); }
  .project-toggle {
    color: var(--text-muted);
    font-size: 12px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .project-toggle.open { transform: rotate(90deg); }
  .project-name {
    font-weight: 600;
    font-size: 14px;
  }
  .project-path {
    font-size: 12px;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 400px;
  }
  .project-meta {
    margin-left: auto;
    display: flex;
    gap: 12px;
    flex-shrink: 0;
  }
  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    background: var(--bg-tertiary);
    color: var(--text-muted);
  }

  /* Sessions list */
  .sessions-list {
    border-top: 1px solid var(--border);
    display: none;
  }
  .sessions-list.open { display: block; }
  .session-row {
    padding: 10px 16px 10px 40px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    font-size: 13px;
  }
  .session-row:last-child { border-bottom: none; }
  .session-row:hover { background: var(--bg-tertiary); }
  .session-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .session-title .untitled { color: var(--text-muted); font-style: italic; }
  .session-count {
    font-size: 12px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .session-time {
    font-size: 12px;
    color: var(--text-muted);
    flex-shrink: 0;
    min-width: 90px;
    text-align: right;
  }

  /* Session detail modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 800px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg-secondary);
    z-index: 10;
  }
  .modal-header h2 {
    font-size: 16px;
    font-weight: 600;
  }
  .modal-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
  }
  .modal-close:hover { background: var(--bg-tertiary); color: var(--text); }
  .modal-body { padding: 16px 20px; }

  /* Messages */
  .message {
    margin-bottom: 16px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .message.human {
    background: var(--bg-tertiary);
    border-left: 3px solid var(--blue);
  }
  .message.assistant {
    background: var(--bg-tertiary);
    border-left: 3px solid var(--accent);
  }
  .message.tool_use, .message.tool_result {
    background: var(--bg);
    border-left: 3px solid var(--orange);
    font-size: 12px;
    color: var(--text-muted);
  }
  .message.system {
    background: var(--bg);
    border-left: 3px solid var(--text-muted);
    font-size: 12px;
    color: var(--text-muted);
  }
  .msg-role {
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .msg-role .tool-badge {
    font-weight: 400;
    color: var(--orange);
  }
  .msg-role .ts {
    font-weight: 400;
    color: var(--text-muted);
    margin-left: auto;
  }

  /* Loading / empty states */
  .loading, .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .loading::after {
    content: '';
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-left: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Search results */
  .search-results {
    display: none;
  }
  .search-results.active { display: block; }
  .search-result {
    padding: 12px 16px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .search-result:hover { background: var(--bg-tertiary); }
  .search-result-title { font-weight: 600; font-size: 14px; }
  .search-result-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .search-result-snippets { margin-top: 6px; }
  .search-result-snippet {
    font-size: 13px;
    color: var(--text-muted);
    padding: 4px 0;
    line-height: 1.4;
  }
  .search-result-snippet b { color: var(--text); font-weight: 600; }

  /* Load more button */
  .load-more-btn {
    text-align: center;
    padding: 12px 20px;
    margin: 16px 0;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--accent);
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  .load-more-btn:hover { background: var(--bg-secondary); }
  .msg-count-info {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    padding: 8px 0;
  }

  /* Heatmap */
  .heatmap-container {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 24px;
    overflow-x: auto;
  }
  .heatmap-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .heatmap-title .heatmap-total {
    font-weight: 400;
    font-size: 12px;
    color: var(--text-muted);
  }
  .heatmap-title .heatmap-tz {
    margin-left: auto;
    font-weight: 400;
    font-size: 12px;
  }
  .heatmap-title .heatmap-tz select {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
    font-size: 12px;
    padding: 2px 6px;
    outline: none;
    cursor: pointer;
  }
  .heatmap-title .heatmap-tz select:focus {
    border-color: var(--accent-dim);
  }
  .heatmap-svg text {
    fill: var(--text-muted);
    font-size: 10px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .heatmap-svg .day-cell {
    rx: 2;
    ry: 2;
    outline: 1px solid rgba(27, 31, 35, 0.06);
    outline-offset: -1px;
  }
  .heatmap-tooltip {
    position: fixed;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    color: var(--text);
    pointer-events: none;
    z-index: 300;
    white-space: nowrap;
    display: none;
  }
  .heatmap-legend {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
    justify-content: flex-end;
    font-size: 11px;
    color: var(--text-muted);
  }
  .heatmap-legend .legend-cell {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }

  /* Scatter plot */
  .scatter-svg text {
    fill: var(--text-muted);
    font-size: 10px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .scatter-svg .grid-line {
    stroke: #30363d;
    stroke-width: 0.5;
  }
  .scatter-svg .grid-line-work {
    stroke: #238636;
    stroke-width: 0.5;
  }
  .scatter-svg .dot {
    fill: var(--accent);
    opacity: 0.7;
    cursor: pointer;
  }
  .scatter-svg .dot:hover {
    opacity: 1;
  }
</style>
</head>
<body>

<div class="header">
  <h1>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    Claude Session Hub
  </h1>
  <div class="header-right">
    <input type="text" class="search-box" id="searchInput" placeholder="Search sessions... (Enter to search)">
    <span class="machine-count" id="machineCount"></span>
  </div>
</div>

<div class="content">
  <div id="heatmap" class="heatmap-container" style="display:none"></div>
  <div id="scatterplot" class="heatmap-container" style="display:none"></div>
  <div id="loading" class="loading">Loading timeline</div>
  <div id="timeline"></div>
  <div id="searchResults" class="search-results"></div>
  <div id="emptyState" class="empty" style="display:none">
    No sessions uploaded yet. Start the daemon on your machines to begin.
  </div>
</div>

<!-- Session detail modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2 id="modalTitle">Session</h2>
        <div class="modal-meta" id="modalMeta"></div>
      </div>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="heatmap-tooltip" id="heatmapTooltip"></div>
<div class="heatmap-tooltip" id="scatterTooltip"></div>

<script>
const API = '';  // Same origin

// --- Helpers ---
function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
  return d.toLocaleDateString();
}

function formatTime(dateStr) {
  if (!dateStr) return '';
  return new Date(dateStr).toLocaleString();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function truncate(text, maxLen = 120) {
  if (!text) return '';
  return text.length > maxLen ? text.slice(0, maxLen) + '...' : text;
}

// --- Heatmap ---
const HEATMAP_TIMEZONES = [
  'UTC',
  'America/New_York', 'America/Chicago', 'America/Denver', 'America/Los_Angeles',
  'Europe/London', 'Europe/Paris', 'Europe/Berlin',
  'Asia/Shanghai', 'Asia/Tokyo', 'Asia/Kolkata',
  'Australia/Sydney', 'Pacific/Auckland',
];

function getHeatmapTz() {
  return localStorage.getItem('heatmap_tz') || Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
}

const HEATMAP_COLORS = ['#1e2733', '#0e4429', '#006d32', '#26a641', '#3fb950'];

function getHeatmapColor(prompts) {
  if (prompts === 0) return HEATMAP_COLORS[0];
  if (prompts <= 20) return HEATMAP_COLORS[1];
  if (prompts <= 50) return HEATMAP_COLORS[2];
  if (prompts < 100) return HEATMAP_COLORS[3];
  return HEATMAP_COLORS[4];
}

function renderHeatmap(data) {
  const dayMap = new Map();
  for (const d of data.days) {
    dayMap.set(d.date, d);
  }

  const CELL = 11, GAP = 2, PITCH = CELL + GAP;
  const LEFT = 30, TOP = 20;
  const COLS = 53, ROWS = 7;
  const svgW = LEFT + COLS * PITCH;
  const svgH = TOP + ROWS * PITCH;

  // Find the starting Sunday: go back from today to Sunday, then 52 more weeks
  const today = new Date();
  const todayDay = today.getDay(); // 0=Sun
  const start = new Date(today);
  start.setDate(start.getDate() - todayDay - 52 * 7);

  const rects = [];
  const monthLabels = [];
  let lastMonth = -1;

  const cursor = new Date(start);
  for (let col = 0; col < COLS; col++) {
    for (let row = 0; row < ROWS; row++) {
      if (cursor > today) { cursor.setDate(cursor.getDate() + 1); continue; }

      const dateStr = cursor.toISOString().slice(0, 10);
      const entry = dayMap.get(dateStr) || { prompts: 0, sessions: 0 };
      const x = LEFT + col * PITCH;
      const y = TOP + row * PITCH;

      rects.push(
        `<rect class="day-cell" x="${x}" y="${y}" width="${CELL}" height="${CELL}" ` +
        `fill="${getHeatmapColor(entry.prompts)}" ` +
        `data-date="${dateStr}" data-prompts="${entry.prompts}" data-sessions="${entry.sessions}"/>`
      );

      // Month label at top when month changes (only on first row)
      if (row === 0) {
        const month = cursor.getMonth();
        if (month !== lastMonth) {
          lastMonth = month;
          const label = cursor.toLocaleString('default', { month: 'short' });
          monthLabels.push(`<text x="${x}" y="${TOP - 6}">${label}</text>`);
        }
      }

      cursor.setDate(cursor.getDate() + 1);
    }
  }

  // Day-of-week labels
  const dayLabels = ['', 'Mon', '', 'Wed', '', 'Fri', ''];
  const dayLabelSvg = dayLabels.map((label, i) => {
    if (!label) return '';
    return `<text x="0" y="${TOP + i * PITCH + CELL - 2}" text-anchor="start">${label}</text>`;
  }).join('');

  const svg = `<svg class="heatmap-svg" width="${svgW}" height="${svgH}">${monthLabels.join('')}${dayLabelSvg}${rects.join('')}</svg>`;

  const legend = `
    <div class="heatmap-legend">
      <span>Less</span>
      ${HEATMAP_COLORS.map(c => `<div class="legend-cell" style="background:${c}"></div>`).join('')}
      <span>More</span>
    </div>
  `;

  const currentTz = getHeatmapTz();
  const tzOptions = HEATMAP_TIMEZONES.includes(currentTz)
    ? HEATMAP_TIMEZONES
    : [currentTz, ...HEATMAP_TIMEZONES];
  const tzSelect = tzOptions.map(tz =>
    `<option value="${tz}" ${tz === currentTz ? 'selected' : ''}>${tz.replace(/_/g, ' ')}</option>`
  ).join('');

  const container = document.getElementById('heatmap');
  container.innerHTML = `
    <div class="heatmap-title">
      Activity
      <span class="heatmap-total">${data.total_prompts.toLocaleString()} prompts in the past year</span>
      <span class="heatmap-tz"><select id="heatmapTzSelect">${tzSelect}</select></span>
    </div>
    ${svg}
    ${legend}
  `;
  container.style.display = 'block';

  document.getElementById('heatmapTzSelect').addEventListener('change', (e) => {
    localStorage.setItem('heatmap_tz', e.target.value);
    loadHeatmap();
    loadScatterPlot();
  });

  // Tooltip
  const tooltip = document.getElementById('heatmapTooltip');
  container.querySelectorAll('.day-cell').forEach(rect => {
    rect.addEventListener('mouseenter', (e) => {
      const d = new Date(rect.dataset.date + 'T12:00:00');
      const dateLabel = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
      const prompts = parseInt(rect.dataset.prompts);
      const sessions = parseInt(rect.dataset.sessions);
      const promptText = prompts === 0 ? 'No prompts' : `${prompts} prompt${prompts !== 1 ? 's' : ''}`;
      const sessionText = `${sessions} session${sessions !== 1 ? 's' : ''}`;
      tooltip.textContent = prompts === 0 ? `${promptText} on ${dateLabel}` : `${promptText}, ${sessionText} on ${dateLabel}`;
      tooltip.style.display = 'block';
      const r = rect.getBoundingClientRect();
      let left = r.left + r.width / 2 - tooltip.offsetWidth / 2;
      left = Math.max(4, Math.min(left, window.innerWidth - tooltip.offsetWidth - 4));
      tooltip.style.left = left + 'px';
      tooltip.style.top = (r.top - tooltip.offsetHeight - 6) + 'px';
    });
    rect.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });
  });
}

async function loadHeatmap() {
  try {
    const tz = getHeatmapTz();
    const resp = await fetch(`${API}/api/heatmap?tz=${encodeURIComponent(tz)}`);
    const data = await resp.json();
    renderHeatmap(data);
  } catch (err) {
    console.error('Failed to load heatmap:', err);
  }
}

// --- 7-day scatter plot ---
function renderScatterPlot(data) {
  const LEFT = 50, TOP = 30, BOTTOM = 50, RIGHT = 20;
  const PLOT_W = 630, PLOT_H = 300;
  const svgW = LEFT + PLOT_W + RIGHT;
  const svgH = TOP + PLOT_H + BOTTOM;
  const DAY_W = PLOT_W / 7;

  const currentTz = getHeatmapTz();
  const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: currentTz });

  // Build 7-day list
  const days = [];
  const todayParts = todayStr.split('-').map(Number);
  const todayDate = new Date(todayParts[0], todayParts[1] - 1, todayParts[2]);
  for (let i = 6; i >= 0; i--) {
    const d = new Date(todayDate);
    d.setDate(d.getDate() - i);
    const yyyy = String(d.getFullYear());
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    const dateStr = `${yyyy}-${mm}-${dd}`;
    const weekday = d.toLocaleDateString('en-US', { weekday: 'short' });
    days.push({ dateStr, label: `${yyyy}${mm}${dd}`, weekday });
  }
  const dayIndex = new Map();
  days.forEach((d, i) => dayIndex.set(d.dateStr, i));

  const hourToY = (h) => TOP + ((24 - h) / 24) * PLOT_H;
  const dayToX = (i) => LEFT + i * DAY_W + DAY_W / 2;

  const parts = [];

  // Horizontal grid lines — gray for standard hours
  for (const h of [0, 4, 8, 10, 12, 16, 18, 20, 24]) {
    const y = hourToY(h);
    parts.push(`<line class="grid-line" x1="${LEFT}" y1="${y}" x2="${LEFT + PLOT_W}" y2="${y}"/>`);
  }
  // Green for work hours
  for (const h of [11, 13, 15, 17, 19]) {
    const y = hourToY(h);
    parts.push(`<line class="grid-line-work" x1="${LEFT}" y1="${y}" x2="${LEFT + PLOT_W}" y2="${y}"/>`);
  }

  // Vertical day separators
  for (let i = 0; i <= 7; i++) {
    const x = LEFT + i * DAY_W;
    parts.push(`<line class="grid-line" x1="${x}" y1="${TOP}" x2="${x}" y2="${TOP + PLOT_H}"/>`);
  }

  // Y-axis labels
  for (const h of [0, 4, 8, 12, 16, 20, 24]) {
    parts.push(`<text x="${LEFT - 6}" y="${hourToY(h) + 3}" text-anchor="end">${h}</text>`);
  }

  // X-axis labels (date + weekday)
  for (let i = 0; i < 7; i++) {
    const x = dayToX(i);
    parts.push(`<text x="${x}" y="${TOP + PLOT_H + 16}" text-anchor="middle">${days[i].label}</text>`);
    parts.push(`<text x="${x}" y="${TOP + PLOT_H + 30}" text-anchor="middle">${days[i].weekday}</text>`);
  }

  // Y-axis title
  parts.push(`<text x="14" y="${TOP + PLOT_H / 2}" text-anchor="middle" transform="rotate(-90,14,${TOP + PLOT_H / 2})">Clock</text>`);

  // Plot dots
  for (const pt of data.points) {
    const dateStr = pt.timestamp.slice(0, 10);
    const di = dayIndex.get(dateStr);
    if (di === undefined) continue;

    const timeParts = pt.timestamp.slice(11).split(':');
    const fractionalHour = parseInt(timeParts[0]) + parseInt(timeParts[1]) / 60;
    const y = hourToY(fractionalHour);
    const jitter = (Math.random() - 0.5) * (DAY_W * 0.5);
    const x = dayToX(di) + jitter;

    parts.push(
      `<circle class="dot" cx="${x}" cy="${y}" r="3" ` +
      `data-session-id="${pt.session_id}" ` +
      `data-title="${escapeHtml(pt.session_title || 'Untitled')}" ` +
      `data-time="${pt.timestamp}"/>`
    );
  }

  const container = document.getElementById('scatterplot');
  container.innerHTML = `
    <div class="heatmap-title">
      Report on ${todayStr}
      <span class="heatmap-total">${data.total} prompts in 7 days</span>
    </div>
    <svg class="scatter-svg" width="${svgW}" height="${svgH}">${parts.join('')}</svg>
  `;
  container.style.display = 'block';

  // Tooltip + click
  const tooltip = document.getElementById('scatterTooltip');
  container.querySelectorAll('.dot').forEach(dot => {
    dot.addEventListener('mouseenter', () => {
      const time = dot.dataset.time.slice(11, 16);
      const date = dot.dataset.time.slice(0, 10);
      tooltip.textContent = `${date} ${time} — ${dot.dataset.title}`;
      tooltip.style.display = 'block';
      const r = dot.getBoundingClientRect();
      let left = r.left + r.width / 2 - tooltip.offsetWidth / 2;
      left = Math.max(4, Math.min(left, window.innerWidth - tooltip.offsetWidth - 4));
      tooltip.style.left = left + 'px';
      tooltip.style.top = (r.top - tooltip.offsetHeight - 6) + 'px';
    });
    dot.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
    dot.addEventListener('click', () => { openSession(parseInt(dot.dataset.sessionId)); });
  });
}

async function loadScatterPlot() {
  try {
    const tz = getHeatmapTz();
    const resp = await fetch(`${API}/api/activity?tz=${encodeURIComponent(tz)}`);
    const data = await resp.json();
    renderScatterPlot(data);
  } catch (err) {
    console.error('Failed to load scatter plot:', err);
  }
}

// --- Render timeline ---
async function loadTimeline() {
  const loadingEl = document.getElementById('loading');
  const timelineEl = document.getElementById('timeline');
  const emptyEl = document.getElementById('emptyState');
  const countEl = document.getElementById('machineCount');

  try {
    const resp = await fetch(`${API}/api/timeline`);
    const data = await resp.json();
    loadingEl.style.display = 'none';

    if (!data.length) {
      emptyEl.style.display = 'block';
      return;
    }

    const totalSessions = data.reduce(
      (sum, m) => sum + m.projects.reduce((s, p) => s + p.session_count, 0), 0
    );
    countEl.textContent = `${data.length} machine${data.length > 1 ? 's' : ''} · ${totalSessions} sessions`;

    timelineEl.innerHTML = data.map(machine => `
      <div class="machine-group">
        <div class="machine-header">
          <div class="machine-dot ${isStale(machine.machine.last_seen_at) ? 'stale' : ''}"></div>
          <span class="machine-name">${escapeHtml(machine.machine.name)}</span>
          ${machine.machine.os ? `<span class="machine-os">${escapeHtml(machine.machine.os)}</span>` : ''}
          <span class="machine-seen">last seen ${timeAgo(machine.machine.last_seen_at)}</span>
        </div>
        ${machine.projects.map(project => renderProject(project)).join('')}
      </div>
    `).join('');

    // Attach toggle listeners
    timelineEl.querySelectorAll('.project-header').forEach(el => {
      el.addEventListener('click', () => {
        const list = el.nextElementSibling;
        const toggle = el.querySelector('.project-toggle');
        list.classList.toggle('open');
        toggle.classList.toggle('open');
      });
    });

    // Attach session click listeners
    timelineEl.querySelectorAll('.session-row').forEach(el => {
      el.addEventListener('click', () => {
        openSession(parseInt(el.dataset.sessionId));
      });
    });

  } catch (err) {
    loadingEl.textContent = 'Failed to load timeline: ' + err.message;
    console.error(err);
  }
}

function isStale(lastSeen) {
  if (!lastSeen) return true;
  return (Date.now() - new Date(lastSeen).getTime()) > 300000; // 5 minutes
}

function renderProject(project) {
  return `
    <div class="project">
      <div class="project-header">
        <span class="project-toggle">▶</span>
        <span class="project-name">${escapeHtml(project.display_name || '(unnamed)')}</span>
        <span class="project-path" title="${escapeHtml(project.original_path)}">${escapeHtml(project.original_path)}</span>
        <div class="project-meta">
          <span class="badge">${project.session_count} session${project.session_count !== 1 ? 's' : ''}</span>
          <span class="badge">${timeAgo(project.last_activity_at)}</span>
        </div>
      </div>
      <div class="sessions-list">
        ${project.sessions.map(s => `
          <div class="session-row" data-session-id="${s.id}">
            <span class="session-title">${s.title ? escapeHtml(truncate(s.title, 80)) : '<span class="untitled">Untitled session</span>'}</span>
            <span class="session-count">${s.message_count} turns</span>
            <span class="session-time">${timeAgo(s.last_activity_at)}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// --- Session detail modal ---
let currentSessionId = null;
let currentOffset = 0;
let currentTotal = 0;
const PAGE_SIZE = 500;

async function openSession(sessionId) {
  currentSessionId = sessionId;
  currentOffset = 0;
  currentTotal = 0;

  const overlay = document.getElementById('modalOverlay');
  const body = document.getElementById('modalBody');
  const title = document.getElementById('modalTitle');
  const meta = document.getElementById('modalMeta');

  overlay.classList.add('open');
  body.innerHTML = '<div class="loading">Loading session</div>';
  title.textContent = 'Loading...';
  meta.textContent = '';

  await loadMessages(sessionId, 0, false);
}

async function loadMessages(sessionId, offset, append) {
  const body = document.getElementById('modalBody');
  const title = document.getElementById('modalTitle');
  const meta = document.getElementById('modalMeta');

  try {
    const resp = await fetch(`${API}/api/sessions/${sessionId}?offset=${offset}&limit=${PAGE_SIZE}`);
    const session = await resp.json();

    currentTotal = session.total_messages;
    currentOffset = offset + session.messages.length;

    if (!append) {
      title.textContent = session.title || 'Untitled session';
      meta.innerHTML = `
        ${escapeHtml(session.machine_name)} · ${escapeHtml(session.project_path)}<br>
        ${formatTime(session.started_at)} — ${formatTime(session.last_activity_at)}
      `;
      body.innerHTML = '';
    } else {
      body.querySelector('.load-more-btn')?.remove();
    }

    // Update message count display
    const countInfo = `<div class="msg-count-info">Showing ${currentOffset} of ${currentTotal} messages</div>`;
    meta.querySelector('.msg-count-info')?.remove();
    meta.insertAdjacentHTML('beforeend', countInfo);

    body.insertAdjacentHTML('beforeend', session.messages.map(renderMessage).join(''));

    // Add "Load more" button if more messages exist
    if (currentOffset < currentTotal) {
      const remaining = currentTotal - currentOffset;
      body.insertAdjacentHTML('beforeend',
        `<div class="load-more-btn" onclick="loadMessages(${sessionId}, ${currentOffset}, true)">
          Load more (${remaining} remaining)
        </div>`
      );
    }

  } catch (err) {
    if (!append) {
      body.innerHTML = `<div class="empty">Failed to load session: ${err.message}</div>`;
    }
  }
}

function renderMessage(msg) {
  const role = msg.role || msg.msg_type || 'unknown';
  const raw = msg.raw_json || {};
  const ts = msg.timestamp ? `<span class="ts">${formatTime(msg.timestamp)}</span>` : '';

  // Skip non-visible message types
  if (['file-history-snapshot', 'last-prompt', 'system'].includes(role)) return '';

  // Progress messages are tool results
  if (role === 'progress') {
    const data = raw.data || {};
    const toolName = data.tool_name || raw.parentToolUseID || 'tool';
    let content = '';
    if (data.content) {
      if (typeof data.content === 'string') {
        content = data.content;
      } else if (Array.isArray(data.content)) {
        content = data.content
          .filter(b => b && typeof b === 'object' && b.text)
          .map(b => b.text)
          .join('\n') || JSON.stringify(data.content, null, 2).slice(0, 1000);
      }
    }
    if (!content) content = JSON.stringify(data, null, 2).slice(0, 1000);
    return `
      <div class="message tool_result">
        <div class="msg-role">tool result <span class="tool-badge">${escapeHtml(String(toolName))}</span> ${ts}</div>
        ${escapeHtml(truncate(content, 2000))}
      </div>
    `;
  }

  // User messages
  if (['human', 'user'].includes(role)) {
    const content = msg.content_text || '(no text content)';
    return `
      <div class="message human">
        <div class="msg-role">human ${ts}</div>
        ${escapeHtml(truncate(content, 2000))}
      </div>
    `;
  }

  // Assistant messages — may contain text blocks and tool_use blocks interleaved
  if (role === 'assistant') {
    const message = raw.message || {};
    const contentBlocks = message.content;
    const parts = [];

    if (Array.isArray(contentBlocks)) {
      for (const block of contentBlocks) {
        if (!block || typeof block !== 'object') continue;
        if (block.type === 'text' && block.text) {
          parts.push(`
            <div class="message assistant">
              <div class="msg-role">assistant ${ts}</div>
              ${escapeHtml(truncate(block.text, 2000))}
            </div>
          `);
        } else if (block.type === 'tool_use') {
          const input = block.input || {};
          let inputDisplay = '';
          // For common tools, show the most useful field
          if (input.command) inputDisplay = input.command;
          else if (input.file_path) inputDisplay = input.file_path + (input.pattern ? ': ' + input.pattern : '');
          else if (input.pattern) inputDisplay = input.pattern;
          else if (input.prompt) inputDisplay = truncate(input.prompt, 200);
          else inputDisplay = JSON.stringify(input, null, 2).slice(0, 500);

          parts.push(`
            <div class="message tool_use">
              <div class="msg-role">tool use <span class="tool-badge">${escapeHtml(block.name || 'unknown')}</span> ${ts}</div>
              ${escapeHtml(truncate(inputDisplay, 2000))}
            </div>
          `);
        }
      }
    }

    // Fallback if no blocks parsed
    if (parts.length === 0) {
      const content = msg.content_text || '(no text content)';
      parts.push(`
        <div class="message assistant">
          <div class="msg-role">assistant ${ts}</div>
          ${escapeHtml(truncate(content, 2000))}
        </div>
      `);
    }

    return parts.join('');
  }

  // Fallback for other types
  const content = msg.content_text || JSON.stringify(raw, null, 2).slice(0, 500);
  return `
    <div class="message system">
      <div class="msg-role">${escapeHtml(role)} ${ts}</div>
      ${escapeHtml(truncate(content, 2000))}
    </div>
  `;
}

// Close modal
document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
});
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    e.currentTarget.classList.remove('open');
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.getElementById('modalOverlay').classList.remove('open');
  }
});

// --- Search ---
let searchTimeout;
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
const timelineEl2 = document.getElementById('timeline');

const heatmapEl = document.getElementById('heatmap');
const scatterEl = document.getElementById('scatterplot');

searchInput.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter') {
    const q = searchInput.value.trim();
    if (!q) {
      searchResults.classList.remove('active');
      searchResults.innerHTML = '';
      timelineEl2.style.display = 'block';
      heatmapEl.style.display = 'block';
      scatterEl.style.display = 'block';
      return;
    }
    try {
      const resp = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}`);
      const results = await resp.json();
      timelineEl2.style.display = 'none';
      heatmapEl.style.display = 'none';
      scatterEl.style.display = 'none';
      searchResults.classList.add('active');

      if (!results.length) {
        searchResults.innerHTML = '<div class="empty">No results found</div>';
        return;
      }

      searchResults.innerHTML = results.map(r => {
        const snippetHtml = (r.snippets || []).slice(0, 3).map(s =>
          `<div class="search-result-snippet">${s}</div>`
        ).join('');
        return `
          <div class="search-result" onclick="openSession(${r.session_id})">
            <div class="search-result-title">${escapeHtml(r.title || 'Untitled')}</div>
            <div class="search-result-meta">
              ${escapeHtml(r.machine_name)} · ${escapeHtml(r.project_name || r.project_path)} ·
              ${r.message_count} messages · ${timeAgo(r.last_activity_at)}
            </div>
            ${snippetHtml ? `<div class="search-result-snippets">${snippetHtml}</div>` : ''}
          </div>
        `;
      }).join('');
    } catch (err) {
      searchResults.innerHTML = `<div class="empty">Search failed: ${err.message}</div>`;
    }
  }
});

// Clear search when input is emptied
searchInput.addEventListener('input', () => {
  if (!searchInput.value.trim()) {
    searchResults.classList.remove('active');
    searchResults.innerHTML = '';
    timelineEl2.style.display = 'block';
    heatmapEl.style.display = 'block';
    scatterEl.style.display = 'block';
  }
});

// --- Init ---
loadHeatmap();
loadScatterPlot();
loadTimeline();
// Refresh every 30 seconds
setInterval(loadTimeline, 30000);
</script>
