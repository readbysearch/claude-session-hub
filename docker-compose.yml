version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: claude_session_hub
      POSTGRES_USER: csh_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csh_user -d claude_session_hub"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://csh_user:${POSTGRES_PASSWORD:-changeme}@db:5432/claude_session_hub
      ADMIN_KEY: ${ADMIN_KEY:-admin_changeme_please}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./web:/app/web:ro

volumes:
  pgdata:
